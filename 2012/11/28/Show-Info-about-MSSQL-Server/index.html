    <div class="entry">
      
        <h3 id="Show-all-tables"><a href="#Show-all-tables" class="headerlink" title="Show all tables"></a>Show all tables</h3><p>  <code>select * from information_schema.tables</code></p>
<h3 id="Show-user-privilege"><a href="#Show-user-privilege" class="headerlink" title="Show user privilege"></a>Show user privilege</h3><figure class="highlight sqf"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div></pre></td><td class="code"><pre><div class="line"><span class="built_in">SELECT</span> * <span class="keyword">FROM</span> INFORMATION_SCHEMA.TABLE_PRIVILEGES</div><div class="line"><span class="built_in">exec</span> sp_helprotect</div></pre></td></tr></table></figure>
<h3 id="Change-password-of-sa"><a href="#Change-password-of-sa" class="headerlink" title="Change password of sa"></a>Change password of sa</h3><figure class="highlight erlang-repl"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div></pre></td><td class="code"><pre><div class="line">osql -S yourservername -E</div><div class="line"><span class="meta">1&gt; </span>EXEC sp_password NULL, <span class="string">'yourpassword'</span>, <span class="string">'sa'</span></div><div class="line"><span class="meta">2&gt; </span>GO</div></pre></td></tr></table></figure>
