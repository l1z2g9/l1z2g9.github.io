ass="line">224</div><div class="line">225</div><div class="line">226</div><div class="line">227</div><div class="line">228</div><div class="line">229</div><div class="line">230</div><div class="line">231</div><div class="line">232</div><div class="line">233</div><div class="line">234</div><div class="line">235</div><div class="line">236</div><div class="line">237</div><div class="line">238</div><div class="line">239</div><div class="line">240</div><div class="line">241</div><div class="line">242</div><div class="line">243</div><div class="line">244</div><div class="line">245</div><div class="line">246</div><div class="line">247</div><div class="line">248</div><div class="line">249</div><div class="line">250</div><div class="line">251</div><div class="line">252</div><div class="line">253</div><div class="line">254</div><div class="line">255</div><div class="line">256</div><div class="line">257</div><div class="line">258</div><div class="line">259</div><div class="line">260</div><div class="line">261</div><div class="line">262</div><div class="line">263</div><div class="line">264</div></pre></td><td class="code"><pre><div class="line"><span class="keyword">package</span> jay;</div><div class="line"></div><div class="line"><span class="keyword">import</span> java.io.<span class="keyword">BufferedReader</span>;</div><div class="line"><span class="keyword">import</span> java.io.FileInputStream;</div><div class="line"><span class="keyword">import</span> java.io.FileOutputStream;</div><div class="line"><span class="keyword">import</span> java.io.FileReader;</div><div class="line"><span class="keyword">import</span> java.sql.Connection;</div><div class="line"><span class="keyword">import</span> java.sql.DriverManager;</div><div class="line"><span class="keyword">import</span> java.sql.ResultSet;</div><div class="line"><span class="keyword">import</span> java.sql.SQLException;</div><div class="line"><span class="keyword">import</span> java.sql.Statement;</div><div class="line"><span class="keyword">import</span> java.util.ArrayList;</div><div class="line"><span class="keyword">import</span> java.util.<span class="keyword">HashMap</span>;</div><div class="line"><span class="keyword">import</span> java.util.List;</div><div class="line"><span class="keyword">import</span> java.util.Map;</div><div class="line"><span class="keyword">import</span> java.util.regex.Pattern;</div><div class="line"></div><div class="line"><span class="keyword">import</span> <span class="keyword">static</span> java.lang.System.out;</div><div class="line"><span class="keyword">import</span> org.apache.poi.hssf.usermodel.HSSFCell;</div><div class="line"><span class="keyword">import</span> org.apache.poi.hssf.usermodel.HSSFCellStyle;</div><div class="line"><span class="keyword">import</span> org.apache.poi.hssf.usermodel.HSSFFont;</div><div class="line"><span class="keyword">import</span> org.apache.poi.hssf.usermodel.HSSFRichTextString;</div><div class="line"><span class="keyword">import</span> org.apache.poi.hssf.usermodel.HSSFRow;</div><div class="line"><span class="keyword">import</span> org.apache.poi.hssf.usermodel.HSSFSheet;</div><div class="line"><span class="keyword">import</span> org.apache.poi.hssf.usermodel.HSSFWorkbook;</div><div class="line"><span class="keyword">import</span> org.apache.poi.hssf.util.HSSFColor;</div><div class="line"></div><div class="line"><span class="keyword">public</span> class CheckData &#123;</div><div class="line"></div><div class="line">  <span class="keyword">static</span> &#123;</div><div class="line">    <span class="keyword">try</span> &#123;</div><div class="line">      Class.forName(<span class="string">"com.microsoft.sqlserver.jdbc.SQLServerDriver"</span>);</div><div class="line">    &#125; <span class="keyword">catch</span> (ClassNotFoundException e) &#123;</div><div class="line">      <span class="comment">// TODO Auto-generated catch block</span></div><div class="line">      e.printStackTrace();</div><div class="line">    &#125;</div><div class="line">  &#125;</div><div class="line"></div><div class="line">  <span class="keyword">static</span> <span class="keyword">void</span> run(<span class="keyword">String</span> db, <span class="built_in">boolean</span> only_chinese) <span class="keyword">throws</span> Exception &#123;</div><div class="line">    Map&lt;<span class="keyword">String</span>, List&lt;<span class="keyword">String</span>&gt;&gt; <span class="built_in">map</span> = <span class="keyword">new</span> <span class="keyword">HashMap</span>&lt;<span class="keyword">String</span>, List&lt;<span class="keyword">String</span>&gt;&gt;();</div><div class="line"></div><div class="line">    <span class="keyword">BufferedReader</span> reader = <span class="keyword">new</span> <span class="keyword">BufferedReader</span>(<span class="keyword">new</span> FileReader(db + <span class="string">".txt"</span>));</div><div class="line">    <span class="keyword">String</span> <span class="built_in">line</span>;</div><div class="line"></div><div class="line">    <span class="comment">/**</span></div><div class="line">     * table1=field1,field2,field3,field4,field5</div><div class="line">     * table2=field1,field2,field3,field4,field5</div><div class="line">     */</div><div class="line">    <span class="keyword">while</span> ((<span class="built_in">line</span> = reader.readLine()) != <span class="keyword">null</span>) &#123;</div><div class="line">      List&lt;<span class="keyword">String</span>&gt; list = <span class="keyword">new</span> ArrayList&lt;<span class="keyword">String</span>&gt;();</div><div class="line">      <span class="keyword">String</span>[] parts = <span class="built_in">line</span>.<span class="built_in">split</span>(<span class="string">"="</span>);</div><div class="line">      <span class="keyword">String</span> table = parts[<span class="number">0</span>];</div><div class="line">      <span class="keyword">String</span> fields = parts[<span class="number">1</span>];</div><div class="line">      <span class="keyword">for</span> (<span class="keyword">String</span> filed : fields.<span class="built_in">split</span>(<span class="string">","</span>)) &#123;</div><div class="line">        list.<span class="built_in">add</span>(filed.<span class="built_in">trim</span>());</div><div class="line">      &#125;</div><div class="line">      <span class="built_in">map</span>.put(table, list);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">for</span> (<span class="keyword">String</span> <span class="built_in">key</span> : <span class="built_in">map</span>.keySet()) &#123;</div><div class="line">      out.<span class="built_in">println</span>(<span class="string">"table: "</span> + <span class="built_in">key</span> + <span class="string">", "</span> + <span class="built_in">map</span>.<span class="built_in">get</span>(<span class="built_in">key</span>));</div><div class="line">    &#125;</div><div class="line">    reader.close();</div><div class="line"></div><div class="line">    genData(db, <span class="built_in">map</span>, only_chinese);</div><div class="line">  &#125;</div><div class="line"></div><div class="line">  <span class="keyword">static</span> <span class="keyword">void</span> genData(<span class="keyword">String</span> db, Map&lt;<span class="keyword">String</span>, List&lt;<span class="keyword">String</span>&gt;&gt; <span class="built_in">map</span>,</div><div class="line">      <span class="built_in">boolean</span> only_chinese) &#123;</div><div class="line">    Connection conn = <span class="keyword">null</span>;</div><div class="line"></div><div class="line">    <span class="keyword">try</span> &#123;</div><div class="line">      conn = DriverManager</div><div class="line">          .getConnection(<span class="string">"jdbc:sqlserver://DbServer:1433;integratedSecurity=true;DatabaseName="</span></div><div class="line">              + <span class="string">"Public_"</span> + db);</div><div class="line">    &#125; <span class="keyword">catch</span> (SQLException e) &#123;</div><div class="line">      e.printStackTrace();</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    HSSFWorkbook wb = <span class="keyword">new</span> HSSFWorkbook();</div><div class="line">    HSSFFont f = wb.<span class="built_in">createFont</span>();</div><div class="line">    f.setFontHeightInPoints((<span class="keyword">short</span>) <span class="number">12</span>);</div><div class="line">    <span class="comment">// f.setColor(HSSFColor.RED.index);</span></div><div class="line">    f.setBoldweight(HSSFFont.BOLDWEIGHT_BOLD);</div><div class="line"></div><div class="line">    HSSFCellStyle cs = wb.createCellStyle();</div><div class="line">    cs.setFont(f);</div><div class="line"></div><div class="line">    <span class="built_in">int</span> tables = <span class="number">0</span>;</div><div class="line">    <span class="keyword">for</span> (<span class="keyword">String</span> table : <span class="built_in">map</span>.keySet()) &#123;</div><div class="line">      listField(table, <span class="built_in">map</span>.<span class="built_in">get</span>(table), wb, cs, conn, only_chinese);</div><div class="line">      tables++;</div><div class="line">    &#125;</div><div class="line">    out.<span class="built_in">println</span>(<span class="string">"共有"</span> + tables + <span class="string">"个表的数据输出。"</span>);</div><div class="line"></div><div class="line">    <span class="keyword">try</span> &#123;</div><div class="line">      <span class="keyword">String</span> fileName = db + <span class="string">".xls"</span>;</div><div class="line">      <span class="keyword">if</span> (only_chinese) &#123;</div><div class="line">        fileName = db + <span class="string">"-only-chinese.xls"</span>;</div><div class="line">      &#125;</div><div class="line"></div><div class="line">      FileOutputStream out = <span class="keyword">new</span> FileOutputStream(fileName);</div><div class="line">      wb.write(out);</div><div class="line">      out.close();</div><div class="line">    &#125; <span class="keyword">catch</span> (Exception e) &#123;</div><div class="line">      e.printStackTrace();</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">try</span> &#123;</div><div class="line">      conn.close();</div><div class="line">    &#125; <span class="keyword">catch</span> (SQLException e) &#123;</div><div class="line">      e.printStackTrace();</div><div class="line">    &#125;</div><div class="line">  &#125;</div><div class="line"></div><div class="line">  <span class="keyword">static</span> <span class="keyword">void</span> listField(<span class="keyword">String</span> table, List&lt;<span class="keyword">String</span>&gt; options, HSSFWorkbook wb,</div><div class="line">      HSSFCellStyle cs, Connection conn, <span class="built_in">boolean</span> only_chinese) &#123;</div><div class="line"></div><div class="line">    HSSFSheet sheeet = wb.createSheet(table);</div><div class="line">    <span class="built_in">int</span> row_index = <span class="number">0</span>;</div><div class="line">    HSSFRow row = sheeet.createRow(row_index++);</div><div class="line">    <span class="keyword">for</span> (<span class="built_in">int</span> i = <span class="number">0</span>; i &lt; options.<span class="built_in">size</span>(); i++) &#123;</div><div class="line">      HSSFCell cell = row.createCell(i);</div><div class="line">      cell.setCellValue(options.<span class="built_in">get</span>(i));</div><div class="line">      cell.setCellStyle(cs);</div><div class="line">    &#125;</div><div class="line"></div><div class="line">    <span class="keyword">String</span> selectOption = <span class="string">""</span>;</div><div class="line">    <span class="keyword">for</span> (<span class="built_in">int</span> i = <span class="number">0</span>; i &lt; options.<span class="built_in">size</span>() - <span class="number">1</span>; i++) &#123;</div><div class="line">      selectOption += options.<span class="built_in">get</span>(i) + <span class="string">","</span>;</div><div class="line">    &#125;</div><div class="line">    selectOption += options.<span class="built_in">get</span>(options.<span class="built_in">size</span>() - <span class="number">1</span>);</div><div class="line"></div><div class="line">    Statement stmt;</div><div class="line">    <span class="comment">// 检查是否有中文</span></div><div class="line">    <span class="keyword">final</span> <span class="keyword">String</span> regexp = <span class="string">"[\u4e00-\u9fa5]+"</span>;</div><div class="line">    <span class="keyword">final</span> Pattern pattern = Pattern.compile(regexp);</div><div class="line"></div><div class="line">    <span class="keyword">try</span> &#123;</div><div class="line">      stmt = conn.createStatement();</div><div class="line">      ResultSet rs = stmt.executeQuery(<span class="string">"select "</span> + selectOption</div><div class="line">          + <span class="string">" from "</span> + table);</div><div class="line">      <span class="built_in">int</span> limit = <span class="number">65534</span>;</div><div class="line">      <span class="built_in">boolean</span> needCreate = <span class="keyword">false</span>;</div><div class="line">      <span class="built_in">int</span> sheetIndex = <span class="number">2</span>;</div><div class="line">      <span class="keyword">while</span> (rs.next()) &#123;</div><div class="line">        <span class="keyword">if</span> (row_index &gt; limit &amp;&amp; row_index &lt;= limit * <span class="number">2</span>) &#123;</div><div class="line">          needCreate = <span class="keyword">true</span>;</div><div class="line">          <span class="keyword">if</span> (sheetIndex &gt;= <span class="number">5</span>) &#123;</div><div class="line">            out.<span class="built_in">println</span>(<span class
