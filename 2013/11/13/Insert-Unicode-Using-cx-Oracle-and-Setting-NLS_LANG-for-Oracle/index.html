    <h1 class="title">Insert Unicode Using cx-Oracle and Setting NLS_LANG for Oracle</h1>
  

    </header>
    <div class="entry">
      
        <h1 id="set-enviroment-in-python-or-bash"><a href="#set-enviroment-in-python-or-bash" class="headerlink" title="set enviroment in python or bash"></a>set enviroment in python or bash</h1><figure class="highlight routeros"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div></pre></td><td class="code"><pre><div class="line">os.environ[“NLS_LANG”] = “TRADITIONAL CHINESE_HONG KONG.AL32UTF8” <span class="keyword">or</span></div><div class="line"><span class="builtin-name">export</span> <span class="attribute">NLS_LANG</span>=“TRADITIONAL CHINESE_HONG KONG.AL32UTF8”</div></pre></td></tr></table></figure>
<h1 id="get-lang-in-Oracle"><a href="#get-lang-in-Oracle" class="headerlink" title="get lang in Oracle"></a>get lang in Oracle</h1><figure class="highlight sql"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div></pre></td><td class="code"><pre><div class="line"><span class="keyword">SELECT</span> USERENV (<span class="string">'language'</span>) <span class="keyword">FROM</span> DUAL;</div><div class="line"><span class="keyword">select</span> * <span class="keyword">from</span> v$nls_parameters <span class="keyword">WHERE</span> parameter <span class="keyword">IN</span> ( <span class="string">'NLS_LANGUAGE'</span>, <span class="string">'NLS_TERRITORY'</span>, <span class="string">'NLS_CHARACTERSET'</span>);</div><div class="line"><span class="keyword">SELECT</span> * <span class="keyword">from</span> NLS_DATABASE_PARAMETERS <span class="keyword">WHERE</span> parameter <span class="keyword">IN</span> ( <span class="string">'NLS_LANGUAGE'</span>, <span class="string">'NLS_TERRITORY'</span>, <span class="string">'NLS_CHARACTERSET'</span>);</div></pre></td></tr></table></figure>
<h1 id="others"><a href="#others" class="headerlink" title="others"></a>others</h1><figure class="highlight n1ql"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div></pre></td><td class="code"><pre><div class="line"><span class="keyword">select</span> * <span class="keyword">FROM</span> V$NLS_VALID_VALUES;</div><div class="line"><span class="keyword">select</span> * <span class="keyword">from</span> NLS_SESSION_PARAMETERS;</div><div class="line"><span class="keyword">select</span> * <span class="keyword">from</span> database_properties;</div></pre></td></tr></table></figure>
