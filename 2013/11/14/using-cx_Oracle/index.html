line">150</div><div class="line">151</div><div class="line">152</div><div class="line">153</div><div class="line">154</div><div class="line">155</div><div class="line">156</div><div class="line">157</div><div class="line">158</div><div class="line">159</div><div class="line">160</div><div class="line">161</div><div class="line">162</div><div class="line">163</div><div class="line">164</div><div class="line">165</div><div class="line">166</div><div class="line">167</div><div class="line">168</div><div class="line">169</div><div class="line">170</div><div class="line">171</div><div class="line">172</div><div class="line">173</div><div class="line">174</div><div class="line">175</div><div class="line">176</div><div class="line">177</div><div class="line">178</div><div class="line">179</div><div class="line">180</div><div class="line">181</div><div class="line">182</div><div class="line">183</div><div class="line">184</div><div class="line">185</div><div class="line">186</div><div class="line">187</div><div class="line">188</div><div class="line">189</div><div class="line">190</div><div class="line">191</div><div class="line">192</div><div class="line">193</div><div class="line">194</div><div class="line">195</div></pre></td><td class="code"><pre><div class="line">import cx_Oracle, os</div><div class="line"></div><div class="line">os.environ[<span class="string">"NLS_LANG"</span>] = <span class="string">"TRADITIONAL CHINESE_HONG KONG.AL32UTF8"</span></div><div class="line"></div><div class="line">def trim(str):</div><div class="line">    <span class="keyword">if</span> str == None:</div><div class="line">        <span class="keyword">return</span> <span class="string">''</span></div><div class="line"></div><div class="line">def trim2(strs):</div><div class="line">    <span class="keyword">list</span> = []</div><div class="line">    <span class="keyword">for</span> i in str<span class="variable">s:</span></div><div class="line">        <span class="keyword">if</span> i == None:</div><div class="line">            <span class="keyword">list</span>.<span class="keyword">append</span>(<span class="string">''</span>)</div><div class="line">        <span class="keyword">else</span>:</div><div class="line">            <span class="keyword">list</span>.<span class="keyword">append</span>(i)</div><div class="line">    <span class="keyword">return</span> <span class="keyword">list</span></div><div class="line"></div><div class="line">def generateSql(table, fields):</div><div class="line">    sql = <span class="string">'insert into %s(%s) values ('</span> %(table, <span class="string">','</span>.<span class="keyword">join</span>(fields.<span class="keyword">split</span>(<span class="string">','</span>)) )</div><div class="line">    sql += <span class="string">','</span>.<span class="keyword">join</span>(<span class="keyword">map</span>(lambda <span class="keyword">x</span>: <span class="string">':'</span> + <span class="keyword">x</span> , fields.<span class="keyword">split</span>(<span class="string">','</span>))) + <span class="string">')'</span></div><div class="line">    <span class="keyword">return</span> sql</div><div class="line"></div><div class="line">def generateValues(fields, row):</div><div class="line">    <span class="built_in">values</span> = &#123;&#125;</div><div class="line">    <span class="keyword">f</span> = fields.<span class="keyword">split</span>(<span class="string">','</span>)</div><div class="line">    <span class="keyword">for</span> i in <span class="built_in">range</span>(<span class="built_in">len</span>(<span class="keyword">f</span>)):</div><div class="line">        <span class="built_in">values</span>[<span class="keyword">f</span>[i]] = row[i]</div><div class="line">    <span class="keyword">return</span> <span class="built_in">values</span></div><div class="line"></div><div class="line">def district(cur, extCur):</div><div class="line">    <span class="keyword">return</span> (<span class="string">'district'</span>, <span class="string">'MODULE,CAT_ID,CODE,NAME,DIST_CODE,LAST_UPDATE,UPDATE_BY,UPDATE_ROLE,WAIT_COUNT,INSPECTION_DIST_CODE'</span>)</div><div class="line"></div><div class="line"></div><div class="line">def misc(cur, extCur):</div><div class="line">    <span class="keyword">return</span> (<span class="string">'misc'</span>, <span class="string">'NAME,CODE,DESCR,REMARK,UPDATE_ROLE,WAIT_COUNT,LAST_UPDATE,UPDATE_BY,DD,MM,YEAR,PERIOD,TYPE,REMARK1,DENY_RANK,DURATION_PARAM,REPORT_ID,LIC_TYPE_PARAM,DUMMY_PROMPT,DESCR2'</span>)</div><div class="line"></div><div class="line"></div><div class="line">def main():</div><div class="line">    os.environ[<span class="string">"NLS_LANG"</span>] = <span class="string">"TRADITIONAL CHINESE_HONG KONG.AL32UTF8"</span></div><div class="line">    dsn_tns = cx_Oracle.makedsn(<span class="string">'server'</span>, <span class="number">1521</span>, service_name=<span class="string">'service-name'</span>)</div><div class="line"></div><div class="line">    <span class="keyword">con</span> = cx_Oracle.connect(<span class="string">'dhsms'</span>,<span class="string">'useruat2621'</span>,dsn_tns)</div><div class="line">    extCon = cx_Oracle.connect(<span class="string">'dhsms_int'</span>,<span class="string">'useruat0675'</span>,dsn_tns)</div><div class="line"></div><div class="line">    cur = <span class="keyword">con</span>.<span class="built_in">cursor</span>()</div><div class="line">    extCur = extCon.<span class="built_in">cursor</span>()</div><div class="line">    <span class="keyword">try</span>:</div><div class="line">        table, fields = task()</div><div class="line">        sql = <span class="string">'select %s from %s'</span> %(<span class="string">','</span>.<span class="keyword">join</span>(fields.<span class="keyword">split</span>(<span class="string">','</span>)), table)</div><div class="line">        <span class="keyword">print</span> sql</div><div class="line">        cur.<span class="keyword">execute</span>(sql)</div><div class="line">        <span class="keyword">res</span> = cur.fetchall()</div><div class="line">        <span class="keyword">for</span> row in re<span class="variable">s:</span></div><div class="line">            extCur.<span class="keyword">execute</span>(generateSql(table, fields), generateValues(fields, row))</div><div class="line"></div><div class="line">        extCon.commit()</div><div class="line"></div><div class="line">        cur.<span class="keyword">close</span>()</div><div class="line">        extCur.<span class="keyword">close</span>()</div><div class="line">    except cx_Oracle.DatabaseError, exc:</div><div class="line">        <span class="keyword">print</span> exc</div><div class="line">        error, = exc.<span class="keyword">args</span></div><div class="line">        <span class="keyword">print</span> error.message</div><div class="line">    <span class="keyword">finally</span>:</div><div class="line">        <span class="keyword">print</span> <span class="string">'close connection'</span></div><div class="line">        <span class="keyword">con</span>.<span class="keyword">close</span>()</div><div class="line">        extCon.<span class="keyword">close</span>()</div><div class="line"></div><div class="line">def updateCompanyPublish():</div><div class="line">    uat_dsn_tns = cx_Oracle.makedsn(<span class="string">'server'</span>, <span class="number">1521</span>, service_name=<span class="string">'uat'</span>)</div><div class="line">    prd_dsn_tns = cx_Oracle.makedsn(<span class="string">'server-2'</span>, <span class="number">1521</span>, service_name=<span class="string">'prd'</span>)</div><div class="line"></div><div class="line">    uat_con = cx_Oracle.connect(<span class="string">'user'</span>,<span class="string">'password'</span>,uat_dsn_tns)</div><div class="line">    prd_con = cx_Oracle.connect(<span class="string">'user'</span>,<span class="string">'password'</span>,prd_dsn_tns)</div><div class="line"></div><div class="line">    uat_cur = uat_con.<span class="built_in">cursor</span>()</div><div class="line">    prd_cur = prd_con.<span class="built_in">cursor</span>()</div><div class="line"></div><div class="line">    <span class="keyword">try</span>:</div><div class="line">        prd_cur.<span class="keyword">execute</span>(<span class="string">"select bus_name, bus_name_chn, unit, FLOOR, BLOCK, bldg, st_no, st_name, area_code, brc, brc_br_code from company where brc in ('12813641','05566198','14304442','09774317','17347013','10161559','04052247','10197423','02410516','06508541','19231608','18405151','05528392','08239275','02577649','08593841','06534261','07286166','01491507','07665609','02718104','04502925','37614254','07919620','EXEMPT07','10492160','13343992','02545054','02725127','04795495','16191407','00039087','04452570','05419513','18766876','01244344','05134767','00559994')"</span>)</div><div class="line">        <span class="keyword">for</span> row in prd_cur:</div><div class="line">            <span class="keyword">print</span> row</div><div class="line">            uat_cur.<span class="keyword">execute</span>(<span class="string">'update company_publish set bus_name=:bus_name,bus_name_chn=:bus_name_chn,unit=:unit,floor=:floor,block=:block,bldg=:bldg,st_no=:st_no,st_name=:st_name,area_code =:area_code where brc = :brc and brc_br_code = :brc_br_code'</span>, &#123;<span class="string">'bus_name'</span>:row[<span class="number">0</span>], <span class="string">'bus_name_chn'</span>:row[<span class="number">0</span>],<span class="string">'bus_name_chn'</span>:row[<span class="number">1</span>],<span class="string">'unit'</span>:row[<span class="number">2</span>],<span class="string">'floor'</span>:row[<span class="number">3</span>],<span class="string">'block'</span>:row[<span class="number">4</span>],<span class="string">'bldg'</span>:row[<span class="number">5</span>],<span class="string">'st_no'</span>:row[<span class="number">6</span>],<span class="string">'st_name'</span>:row[<span class="number">7</span>],<span class="string">'area_code'</span>:row[<span class="number">8</span>],<span class="string">'brc'</span>:row[<span class="number">9</span>],<span class="string">'brc_br_code'</span>:row[<span class="number">10</span>]&#125;)</div><div class="line"></div><div class="line">        prd_cur.<span class="keyword">close</span>()</div><div class="line">        uat_cur.<span class="keyword">close</span>()</div><div class="line">        uat_con.commit()</div><div class="line"></div><div class="line">    <span class="keyword">finally</span>:</div><div class="line">        uat_con.<span class="keyword">close</span>()</div><div class="line">        prd_con.<span class="keyword">close</span>()</div><div class="line"></div><div class="line"></div><div class="line">#updateCompanyPublish()</div><div class="line"></div><div class="line"></div><div class="line">def upgradeSeq():</div><div class="line">    dsn_tns = cx_Oracle.makedsn(<span class="string">'server'</span>, <span class="number">1521</span>, service_name=<span class="string">'service-name'</span>)</div><div class="line"></div><div class="line"></div><div class="line">    extCon = cx_Oracle.connect(<span class="string">'user'</span>,<span class="string">'password'</span>,dsn_tns)</div><div class="line">    extCur = extCon.<span class="built_in">cursor</span>()</div><div class="line">    <span class="keyword">for</span> i in <span class="built_in">range</span>(<span class="number">10000</span>):</div><div class="line">        extCur.<span class="keyword">execute</span>(<span class="string">'select IE_DRUG_ID_SQ.NEXTVAL FROM DUAL'</span>)</div><div class="line">    extCur.<span class="keyword">close</span>()</div><div class="line">    extCon.<span class="keyword">close</span>()</div><div class="line"></div><div class="line"></div><div class="line">def updateAddress():</div><div class="line">    <span class="keyword">f</span> = <span class="keyword">open</span>(<span class="string">'advert_address.txt'</span>)</div><div class="line">    <span class="keyword">c</span> = <span class="keyword">f</span>.<span class="keyword">read</span>()</div><div class="line">    <span class="keyword">f</span>.<span class="keyword">close</span>()</div><div class="line">    os.environ[<span class="string">"NLS_LANG"</span>] = <span class="string">"TRADITIONAL CHINESE_HONG KONG.AL32UTF8"</span></div><div class="line">    <span class="keyword">try</span>:</div><div class="line">        dsn_tns = cx_Oracle.makedsn(<span class="string">'server-2'</span>, <span class="number">1521</span>, <span class="string">'sid'</span>)</div><div class="line">        <span class="keyword">con</span> = cx_Oracle.connect(<span class="string">'user'</span>,<span class="string">'password'</span>,dsn_tns)</div><div class="line">        cur = <span class="keyword">con</span>.<span class="built_in">cursor</span>()</div><div class="line"></div><div class="line"></div><div class="line">        <span class="keyword">for</span> <span class="built_in">line</span> in <span class="keyword">c</span>.splitlines():</div><div class="line">            parts = <span class="built_in">line</span>.<span class="keyword">split</span>(<span class="string">'\t'</span>)</div><div class="line">            seq_no = parts[<span class="number">0</span>]</div><div class="line">            source_name = parts[<span class="number">1</span>]</div><div class="line">            publisher = parts[<span class="number">2</span>]</div><div class="line">            address = parts[<span class="number">3</span>]</div><div class="line">            fax = parts[<span class="number">4</span>]</div><div class="line">            tel = parts[<span class="number">5</span>]</div><div class="line">            <span class="keyword">print</span> seq_no, source_name, publisher, address</div><div class="line">            sql = <span class="string">'update advert_address set source_name = :source_name, publisher = :publisher, address = :address, fax = :fax, tel = :tel where seq_no = :seq_no'</span></div><div class="line">            cur.<span class="keyword">execute</span>(sql, &#123;<span class="string">'seq_no'</span>:seq_no, <span class="string">'source_name'</span>:source_name, <span class="string">'publisher'</span>:publisher, <span class="string">'address'</span>:address, <span class="string">'fax'</span>:fax, <span class="string">'tel'</span>:tel&#125;)</div><div class="line">        cur.<span class="keyword">close</span>()</div><div class="line">        <span class="keyword">con</span>.commit()</div><div class="line">    <span class="keyword">finally</span>:</div><div class="line">        <span class="keyword">print</span> <span class="string">'close connection'</span></div><div class="line">        <span class="keyword">con</span>.<span class="keyword">close</span>()</div><div class="line"></div><div class="line"></div><div class="line">def updateCompanyName():</div><div class="line">    <span class="keyword">f</span> = <span class="keyword">open</span>(<span class="string">'ML data.txt'</span>)</div><div class="line">    <span class="keyword">c</span> = <span class="keyword">f</span>.<span class="keyword">read</span>()</div><div class="line">    <span class="keyword">f</span>.<span class="keyword">close</span>()</div><div class="line"></div><div class="line">    <span class="keyword">try</span>:</div><div class="line">        dsn_tns = cx_Oracle.makedsn(<span class="string">'server'</span>, <span class="number">1521</span>, <span class="string">'psuat'</span>)</div><div class="line">        <span class="keyword">con</span> = cx_Oracle.connect(<span class="string">'user'</span>,<span class="string">'password'</span>,dsn_tns)</div><div class="line">        cur = <span class="keyword">con</span>.<span class="built_in">cursor</span>()</div><div class="line"></div><div class="line">        <span class="keyword">for</span> <span class="built_in">line</span> in <span class="keyword">c</span>.splitlines():</div><div class="line">            parts = <span class="built_in">line</span>.<span class="keyword">split</span>(<span class="string">'\t'</span>)</div><div class="line">            name = parts[<span class="number">2</span>]</div><div class="line">            file_no = parts[<span class="number">3</span>]</div><div class="line">            <span class="keyword">if</span> file_no != <span class="string">''</span>:</div><div class="line">                <span class="keyword">print</span> name, file_no</div><div class="line">            sql = <span class="string">'update company_publish set bus_name_chn = :name where brc = (select brc from lic_app where file_no = :file_no)'</span></div><div class="line">            cur.<span class="keyword">execute</span>(sql, &#123;<span class="string">'name'</span>:name, <span class="string">'file_no'</span>:file_no&#125;)</div><div class="line"></div><div class="line">            sql = <span class="string">'update company set bus_name_chn = :name where brc = (select brc from lic_app where file_no = :file_no)'</span></div><div class="line">            cur.<span class="keyword">execute</span>(sql, &#123;<span class="string">'name'</span>:name, <span class="string">'file_no'</span>:file_no&#125;)</div><div class="line"></div><div class="line">        cur.<span class="keyword">close</span>()</div><div class="line">        <span class="keyword">con</span>.commit()</div><div class="line">    <span class="keyword">finally</span>:</div><div class="line">        <span class="keyword">print</span> <span class="string">'close connection'</span></div><div class="line">        <span class="keyword">con</span>.<span class="keyword">close</span>()</div><div class="line"></div><div class="line"></div><div class="line">def updateUMAProdGroup():</div><div class="line">    <span class="keyword">f</span> = <span class="keyword">open</span>(<span class="string">'uma_group.txt'</span>)</div><div class="line">    <span class="keyword">c</span> = <span cla
